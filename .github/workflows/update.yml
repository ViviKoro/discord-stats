name: Update Discord Stats

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 6h UTC (8h heure française)
  workflow_dispatch:        # permet de lancer manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install .NET (pour DiscordChatExporter)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Download DiscordChatExporter CLI
        run: |
          wget -q https://github.com/Tyrrrz/DiscordChatExporter/releases/latest/download/DiscordChatExporter.Cli.zip
          unzip -q DiscordChatExporter.Cli.zip -d dce
          mv dce/DiscordChatExporter.Cli.dll .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run export script
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python export.py

      - name: Commit & push le nouveau index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update stats $(date +'%Y-%m-%d')"
          git push
